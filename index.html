<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Abdul's Tech Outreach</title>
<meta name="theme-color" content="#0d0d0d">
<style>
:root{--bg:#0d0d0d;--bg2:#161616;--bg3:#1e1e1e;--border:#2a2a2a;--text:#f2f2f2;--text2:#999;--blue:#3b82f6;--green:#22c55e;--red:#ef4444;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:32px 28px;width:100%;max-width:380px;}
.logo{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px;}
.logo span{color:var(--blue);}
.sub{font-size:13px;color:var(--text2);text-align:center;margin-bottom:24px;}
.field{margin-bottom:14px;}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:5px;}
input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 13px;font-size:14px;color:var(--text);font-family:inherit;}
input:focus{outline:none;border-color:var(--blue);}
button{width:100%;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;margin-top:6px;}
button:hover{opacity:.9;}
button:disabled{opacity:.5;cursor:not-allowed;}
.toggle{text-align:center;font-size:13px;color:var(--text2);margin-top:16px;cursor:pointer;}
.toggle span{color:var(--blue);}
.msg{font-size:13px;text-align:center;margin-top:14px;padding:10px;border-radius:8px;display:none;}
.msg.error{background:#2d0f0f;color:var(--red);border:1px solid var(--red);display:block;}
.msg.success{background:#0f2d1a;color:var(--green);border:1px solid var(--green);display:block;}
</style>
</head>
<body>

<div class="box">
  <div class="logo">Abdul's <span>Tech</span></div>
  <div class="sub" id="form-sub">Sign in to your outreach dashboard</div>

  <div class="field">
    <label>Email</label>
    <input type="email" id="email" placeholder="abdulshikdarit@gmail.com">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <button id="submit-btn" onclick="handleSubmit()">Sign in</button>

  <div class="msg" id="msg"></div>

  <div class="toggle" id="toggle-mode" onclick="toggleMode()">
    First time? <span>Create an account</span>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
const SUPABASE_URL = 'https://hkierqvdjyupejpqbtah.supabase.co';
const SUPABASE_KEY = 'sb_publishable_sAGtZ8kRZu4vXGRg63nY0A_JEDiMSYE';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let isSignup = false;

// If already logged in, go straight to app
sb.auth.getSession().then(({data}) => {
  if (data.session) window.location.href = 'app.html';
});

function toggleMode() {
  isSignup = !isSignup;
  document.getElementById('form-sub').textContent = isSignup ? 'Create your account' : 'Sign in to your outreach dashboard';
  document.getElementById('submit-btn').textContent = isSignup ? 'Create account' : 'Sign in';
  document.getElementById('toggle-mode').innerHTML = isSignup
    ? 'Already have an account? <span>Sign in</span>'
    : 'First time? <span>Create an account</span>';
  hideMsg();
}

function showMsg(text, type) {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}
function hideMsg() {
  document.getElementById('msg').className = 'msg';
}

async function handleSubmit() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('submit-btn');

  if (!email || !password) { showMsg('Please fill in both fields', 'error'); return; }
  if (password.length < 6) { showMsg('Password must be at least 6 characters', 'error'); return; }

  btn.disabled = true;
  btn.textContent = isSignup ? 'Creating account...' : 'Signing in...';

  try {
    if (isSignup) {
      const { data, error } = await sb.auth.signUp({ email, password });
      if (error) throw error;
      if (data.user && !data.session) {
        showMsg('Account created! Check your email to confirm, then sign in.', 'success');
        btn.disabled = false;
        btn.textContent = 'Create account';
        return;
      }
      showMsg('Account created! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'app.html', 800);
    } else {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) throw error;
      showMsg('Signed in! Redirecting...', 'success');
      setTimeout(() => window.location.href = 'app.html', 500);
    }
  } catch (err) {
    showMsg(err.message || 'Something went wrong', 'error');
    btn.disabled = false;
    btn.textContent = isSignup ? 'Create account' : 'Sign in';
  }
}

document.getElementById('password').addEventListener('keypress', e => { if (e.key === 'Enter') handleSubmit(); });
</script>
</body>
</html>
